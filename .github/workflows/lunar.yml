name: Daily Lunar Bot (Every 2 Hours)

on:
  schedule:
    - cron: '0 */2 * * *'  # 修改处：每 2 小时运行一次 (UTC 时间)
  workflow_dispatch:       # 允许手动点击运行

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install axios

      - name: Fetch Data and Send Notification
        env:
          TX_KEY: ${{ secrets.TX_KEY }}
          SCT_KEY: ${{ secrets.SCT_KEY }}
        run: |
          node -e "
          const axios = require('axios');
          
          // 自动获取当前日期 (YYYY-MM-DD)
          const now = new Date();
          const year = now.getFullYear();
          const month = String(now.getMonth() + 1).padStart(2, '0');
          const day = String(now.getDate()).padStart(2, '0');
          const dateStr = year + '-' + month + '-' + day;
          
          const txKey = process.env.TX_KEY;
          const sctKey = process.env.SCT_KEY;

          console.log('正在获取 ' + dateStr + ' 的农历数据...');

          axios.get('https://api.tianapi.com/lunar/index.php', {
            params: { key: txKey, date: dateStr }
          })
          .then(txRes => {
            const data = txRes.data;
            if (data.code !== 200) {
              throw new Error('天行API失败: ' + (data.msg || '未知错误'));
            }
            
            const r = data.result;
            const title = '📅 今日农历简报 (' + dateStr + ')';
            const content = 
              '公历：**' + dateStr + '**\\n' +
              '农历：**' + r.luncalendar + '**\\n' +
              '干支：' + r.yeargz + '年 ' + r.monthgz + '月 ' + r.daygz + '日\\n' +
              '生肖：' + r.shengxiao + '\\n' +
              '宜：' + r.yi.join('、') + '\\n' +
              '忌：' + r.ji.join('、');
            
            console.log('数据获取成功，正在发送通知...');

            return axios.post('https://sctapi.ftqq.com/' + sctKey + '.send', null, {
              params: {
                title: title,
                desp: content
              }
            });
          })
          .then(sctRes => {
            if (sctRes.data.code === 0) {
              console.log('✅ 推送成功！');
            } else {
              console.log('⚠️ 推送返回状态:', sctRes.data.message);
            }
          })
          .catch(err => {
            console.error('❌ 发生错误:', err.message);
            process.exit(1);
          });
          "
