name: Lunar Bot Every 2 Hours

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install axios

      - name: Run Script
        env:
          TX_KEY: ${{ secrets.TX_KEY }}
          SCT_KEY: ${{ secrets.SCT_KEY }}
        run: node script.js
