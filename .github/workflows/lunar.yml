name: Daily Lunar Bot (ServerChan Version)

on:
  schedule:
    - cron: '0 1 * * *'  # 每天 UTC 时间 1:00 (北京时间 9:00) 运行
  workflow_dispatch:     # 允许手动触发

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install axios

      - name: Fetch Data and Push Notification
        env:
          TX_KEY: ${{ secrets.TX_KEY }}
          SCT_KEY: ${{ secrets.SCT_KEY }}
        run: |
          node -e "
          const axios = require('axios');
          
          // 1. 获取天行数据 (农历)
          const txKey = process.env.TX_KEY;
          const today = new Date().toISOString().split('T')[0];
          
          axios.get('https://api.tianapi.com/lunar/index.php', {
            params: { key: txKey, date: today }
          })
          .then(txRes => {
            const data = txRes.data;
            if (data.code !== 200) {
              throw new Error('天行API请求失败: ' + data.msg);
            }
            
            const lunarInfo = data.result;
            const title = '📅 今日农历简报';
            const content = 
              '公历：' + today + '\\n' +
              '农历：' + lunarInfo.luncalendar + '\\n' +
              '干支：' + lunarInfo.yeargz + '年 ' + lunarInfo.monthgz + '月 ' + lunarInfo.daygz + '日\\n' +
              '生肖：' + lunarInfo.shengxiao + '\\n' +
              '宜：' + lunarInfo.yi.join('、') + '\\n' +
              '忌：' + lunarInfo.ji.join('、');
            
            // 2. 发送 ServerChan 通知
            const sctKey = process.env.SCT_KEY;
            return axios.post('https://sctapi.ftqq.com/' + sctKey + '.send', null, {
              params: {
                title: title,
                desp: content
              }
            });
          })
          .then(sctRes => {
            if (sctRes.data.code !== 0) {
              console.log('ServerChan 发送结果:', sctRes.data.message);
            } else {
              console.log('推送成功!');
            }
          })
          .catch(err => {
            console.error('发生错误:', err.message);
            process.exit(1); // 让 Action 标记为失败
          });
          "
